name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "VPS_SSH_KEY secret is empty"
            exit 1
          fi

          if [ -z "${VPS_HOST:-}" ]; then
            echo "VPS_HOST secret is empty"
            exit 1
          fi

          VPS_PORT="${VPS_PORT:-22}"

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$SSH_PRIVATE_KEY" \
            | tr -d '\r' \
            > "$HOME/.ssh/deploy_key"

          chmod 600 "$HOME/.ssh/deploy_key"

          ssh-keygen -y -f "$HOME/.ssh/deploy_key" > /dev/null

          ssh-keyscan \
            -T 15 \
            -p "$VPS_PORT" \
            -H "$VPS_HOST" \
            >> "$HOME/.ssh/known_hosts"

          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy application
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" << 'EOF'
              set -e

              cd /opt/llm-blog
              git fetch origin main
              git reset --hard origin/main

              docker compose up -d --build --remove-orphans
              docker image prune -f

              docker compose ps
          EOF

      - name: Health check
        run: |
          sleep 10
          curl --fail --retry 5 --retry-delay 5 http://${{ secrets.VPS_HOST }}
