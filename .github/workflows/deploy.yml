name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 15

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "VPS_SSH_KEY secret is empty"
            exit 1
          fi

          if [ -z "${VPS_HOST:-}" ]; then
            echo "VPS_HOST secret is empty"
            exit 1
          fi

          VPS_PORT="${VPS_PORT:-22}"

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$SSH_PRIVATE_KEY" \
            | tr -d '\r' \
            > "$HOME/.ssh/deploy_key"

          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keygen -y -f "$HOME/.ssh/deploy_key" > /dev/null

          ssh-keyscan \
            -T 15 \
            -p "$VPS_PORT" \
            -H "$VPS_HOST" \
            >> "$HOME/.ssh/known_hosts"

          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy image
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT:-22}"

          ssh \
            -i "$HOME/.ssh/deploy_key" \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=30 \
            -o TCPKeepAlive=yes \
            -o ConnectTimeout=30 \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" << 'EOF'
              set -euo pipefail

              PROJECT_DIR="/opt/llm-blog"
              cd "$PROJECT_DIR"

              git config --global --get-all safe.directory \
                | grep -Fxq "$PROJECT_DIR" \
                || git config --global --add safe.directory "$PROJECT_DIR"

              echo "Updating deployment configuration..."
              git fetch origin main
              git reset --hard origin/main

              echo "Pulling image from GHCR..."
              docker compose pull

              echo "Restarting application..."
              docker compose up -d --remove-orphans

              docker compose ps
              docker image prune -f
          EOF

      - name: Health check
        run: |
          curl \
            --fail \
            --location \
            --show-error \
            --silent \
            --retry 10 \
            --retry-delay 5 \
            --retry-connrefused \
            https://babkin.tech \
            > /dev/null

          echo "Health check passed"
